spring:
  datasource:
    url: jdbc:h2:mem:nexabank_transactions_test;MODE=PostgreSQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  cloud:
    config:
      enabled: false
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
  activemq:
    broker-url: vm://embedded?broker.persistent=false
    user: admin
    password: admin
eureka:
  client:
    enabled: false

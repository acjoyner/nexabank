version: '3.9'

services:

  # ─────────────────────────────────────────────────────────────
  # DATABASE
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nexabank-postgres
    environment:
      POSTGRES_USER: nexabank
      POSTGRES_PASSWORD: nexabank123
      POSTGRES_DB: nexabank
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docs/db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexabank"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────
  # KAFKA (Event Streaming)
  # ─────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: nexabank-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: nexabank-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: nexabank-kafka-ui
    depends_on:
      - kafka
    ports:
      - "9090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: nexabank-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ─────────────────────────────────────────────────────────────
  # ACTIVEMQ (MQ Messaging — point-to-point guaranteed delivery)
  # ─────────────────────────────────────────────────────────────
  activemq:
    image: apache/activemq-artemis:2.32.0
    container_name: nexabank-activemq
    ports:
      - "8161:8161"   # Web admin console
      - "61616:61616" # AMQP / OpenWire broker
    environment:
      ANONYMOUS_LOGIN: 'true'
      ARTEMIS_USER: nexabank
      ARTEMIS_PASSWORD: nexabank123

  # ─────────────────────────────────────────────────────────────
  # SPRING CLOUD INFRASTRUCTURE
  # ─────────────────────────────────────────────────────────────
  eureka-server:
    build:
      context: ./infrastructure/eureka-server
      dockerfile: Dockerfile
    container_name: nexabank-eureka
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  config-server:
    build:
      context: ./infrastructure/config-server
      dockerfile: Dockerfile
    container_name: nexabank-config
    ports:
      - "8888:8888"
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./infrastructure/api-gateway
      dockerfile: Dockerfile
    container_name: nexabank-gateway
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      CONFIG_SERVER_URL: http://config-server:8888
      JWT_SECRET: ${JWT_SECRET:-nexabank-dev-secret-at-least-256-bits-long!}

  # ─────────────────────────────────────────────────────────────
  # BUSINESS MICROSERVICES
  # ─────────────────────────────────────────────────────────────
  account-service:
    build:
      context: ./services/account-service
      dockerfile: Dockerfile
    container_name: nexabank-accounts
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nexabank_accounts
      SPRING_DATASOURCE_USERNAME: nexabank
      SPRING_DATASOURCE_PASSWORD: nexabank123
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET:-nexabank-dev-secret-at-least-256-bits-long!}
      SERVER_PORT: 8081

  transaction-service:
    build:
      context: ./services/transaction-service
      dockerfile: Dockerfile
    container_name: nexabank-transactions
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      activemq:
        condition: service_started
      account-service:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nexabank_transactions
      SPRING_DATASOURCE_USERNAME: nexabank
      SPRING_DATASOURCE_PASSWORD: nexabank123
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ACTIVEMQ_BROKER_URL: tcp://activemq:61616
      SERVER_PORT: 8082

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: nexabank-notifications
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      activemq:
        condition: service_started
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nexabank_notifications
      SPRING_DATASOURCE_USERNAME: nexabank
      SPRING_DATASOURCE_PASSWORD: nexabank123
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ACTIVEMQ_BROKER_URL: tcp://activemq:61616
      SERVER_PORT: 8083

  loan-service:
    build:
      context: ./services/loan-service
      dockerfile: Dockerfile
    container_name: nexabank-loans
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      account-service:
        condition: service_started
      ai-layer:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nexabank_loans
      SPRING_DATASOURCE_USERNAME: nexabank
      SPRING_DATASOURCE_PASSWORD: nexabank123
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://eureka-server:8761/eureka/
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AI_LAYER_URL: http://ai-layer:8000
      SERVER_PORT: 8084

  # ─────────────────────────────────────────────────────────────
  # PYTHON AI LAYER
  # ─────────────────────────────────────────────────────────────
  ai-layer:
    build:
      context: ./ai-layer
      dockerfile: Dockerfile
    container_name: nexabank-ai
    ports:
      - "8000:8000"

  # ─────────────────────────────────────────────────────────────
  # ANGULAR FRONTEND
  # ─────────────────────────────────────────────────────────────
  nexabank-ui:
    build:
      context: ./frontend/nexabank-ui
      dockerfile: Dockerfile
    container_name: nexabank-ui
    ports:
      - "4200:80"
    depends_on:
      - api-gateway

volumes:
  postgres-data:

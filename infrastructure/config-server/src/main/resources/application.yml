server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native   # use filesystem — no Git dependency for local dev
  cloud:
    config:
      server:
        native:
          # Config files for each service live in this directory
          search-locations: classpath:/config

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health, info, refresh

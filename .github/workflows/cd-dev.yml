# ============================================================
# NexaBank CD — Deploy to Dev (GitHub Actions)
# Triggers on push to develop branch
# Builds Docker images, pushes to GitHub Container Registry
# ============================================================
name: CD — Deploy to Dev

on:
  push:
    branches: [develop]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/nexabank

jobs:
  deploy-dev:
    name: Build Images & Deploy to Dev
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build all services
        run: mvn clean package -DskipTests --no-transfer-progress

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        run: |
          SERVICES=(
            "infrastructure/eureka-server"
            "infrastructure/config-server"
            "infrastructure/api-gateway"
            "services/account-service"
            "services/transaction-service"
            "services/notification-service"
            "services/loan-service"
          )
          SHORT_SHA="${GITHUB_SHA::7}"
          for SVC in "${SERVICES[@]}"; do
            NAME=$(basename "$SVC")
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${NAME}"
            docker build -t "${IMAGE}:${SHORT_SHA}" -t "${IMAGE}:dev-latest" "./${SVC}"
            docker push "${IMAGE}:${SHORT_SHA}"
            docker push "${IMAGE}:dev-latest"
          done
          # Python AI layer
          docker build -t "${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ai-layer:${SHORT_SHA}" ./ai-layer
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ai-layer:${SHORT_SHA}"

      - name: Deploy to dev environment
        run: |
          echo "Deploying to dev with docker-compose..."
          docker-compose up -d --build
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET_DEV }}

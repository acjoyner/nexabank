# ============================================================
# NexaBank CI — GitHub Actions
# Triggers on every Pull Request: build, test, coverage report
# ============================================================
name: CI — Build & Test

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  build-and-test:
    name: Build & Test (Java 17)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexabank
          POSTGRES_PASSWORD: nexabank123
          POSTGRES_DB: nexabank_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests with coverage
        run: mvn test --no-transfer-progress
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/nexabank_test
          SPRING_DATASOURCE_USERNAME: nexabank
          SPRING_DATASOURCE_PASSWORD: nexabank123

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/target/surefire-reports/*.xml'

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: '**/target/site/jacoco/'

      - name: Build JAR (skip tests — already ran)
        run: mvn package -DskipTests --no-transfer-progress

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jar-artifacts
          path: '**/target/*.jar'
          retention-days: 7
